<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Driver Monitoring System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            animation: { "pulse-alert": "pulse-alert 1.5s ease-in-out infinite" },
            keyframes: {
              "pulse-alert": {
                "0%, 100%": { opacity: "1", transform: "scale(1)" },
                "50%": { opacity: "0.85", transform: "scale(1.02)" },
              },
            },
          },
        },
      };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js" defer></script>
  </head>
  <body class="min-h-screen bg-slate-950 text-slate-100 antialiased">
    <header
      class="border-b border-slate-800/80 bg-slate-900/80 backdrop-blur px-4 py-3 flex flex-wrap items-center justify-between gap-3"
    >
      <div>
        <h1 class="text-lg font-semibold tracking-tight text-white">Driver Monitoring System</h1>
        <p class="text-xs text-slate-400 mt-0.5" id="status">Starting…</p>
      </div>
      <label
        class="flex items-center gap-2 cursor-pointer select-none text-sm text-slate-300 bg-slate-800/80 px-3 py-1.5 rounded-lg border border-slate-700"
      >
        <input type="checkbox" id="demo-toggle" class="rounded border-slate-600" />
        <span>Demo mode</span>
        <span class="text-[10px] text-slate-500 max-w-[140px] leading-tight"
          >Simulates low EAR &amp; yawns (client-side)</span
        >
      </label>
    </header>

    <div class="p-3 md:p-4 max-w-[1600px] mx-auto flex flex-col gap-4 pb-28">
      <div class="grid grid-cols-1 lg:grid-cols-2 gap-4 items-start">
        <!-- Left: camera + mesh -->
        <section
          class="rounded-xl border border-slate-800 bg-slate-900/50 overflow-hidden shadow-xl"
          aria-label="Webcam and face mesh"
        >
          <div class="aspect-[4/3] max-h-[min(72vh,640px)] bg-black relative mx-auto">
            <video id="video" class="hidden" playsinline></video>
            <canvas id="canvas" class="w-full h-full object-contain block"></canvas>
          </div>
        </section>

        <!-- Right column -->
        <div class="flex flex-col gap-4 min-h-0">
          <!-- Sparklines -->
          <section
            class="rounded-xl border border-slate-800 bg-slate-900/50 p-3 shadow-lg"
            aria-label="Signal charts"
          >
            <h2 class="text-xs font-semibold uppercase tracking-wider text-slate-500 mb-2">Last 30 seconds</h2>
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-3 h-36 md:h-40">
              <div class="min-h-0 relative">
                <canvas id="chart-ear" class="!h-full !w-full"></canvas>
              </div>
              <div class="min-h-0 relative">
                <canvas id="chart-mar" class="!h-full !w-full"></canvas>
              </div>
            </div>
          </section>

          <!-- Severity + alert card -->
          <section
            class="rounded-xl border border-slate-800 bg-slate-900/50 p-4 shadow-lg flex flex-col gap-3"
            aria-live="polite"
          >
            <div class="flex items-center gap-3 flex-wrap">
              <span class="text-xs font-medium text-slate-500 uppercase">Severity</span>
              <div
                id="severity-badge"
                class="severity-badge text-2xl md:text-3xl font-bold px-4 py-2 rounded-xl border-2 transition-all duration-300"
                data-severity="none"
              >
                NONE
              </div>
            </div>
            <div
              class="rounded-lg bg-slate-800/60 border border-slate-700/80 p-4 min-h-[4.5rem]"
              id="alert-card"
            >
              <p class="text-xs text-slate-500 mb-1">Alert</p>
              <p id="alert-card-text" class="text-slate-100 text-sm md:text-base leading-relaxed">
                Waiting for connection…
              </p>
            </div>
          </section>

          <!-- Driving context -->
          <section
            class="rounded-xl border border-slate-800 bg-slate-900/50 p-4 shadow-lg"
            aria-label="Driving context simulation"
          >
            <h2 class="text-xs font-semibold uppercase tracking-wider text-slate-500 mb-3">Driving context</h2>
            <div class="space-y-3">
              <div>
                <label for="speed-slider" class="text-sm text-slate-400 flex justify-between gap-2">
                  <span>Speed</span>
                  <span class="text-white font-mono"><span id="speed-value">35</span> mph</span>
                </label>
                <input
                  type="range"
                  id="speed-slider"
                  min="0"
                  max="120"
                  value="35"
                  class="w-full mt-1 accent-sky-500 h-2 rounded-lg appearance-none bg-slate-800"
                />
              </div>
              <div class="grid grid-cols-2 gap-2 text-sm">
                <div class="rounded-lg bg-slate-800/40 px-3 py-2 border border-slate-700/50">
                  <span class="text-slate-500 text-xs block">Road</span>
                  <span id="road-type" class="font-medium text-sky-300">city</span>
                </div>
                <div class="rounded-lg bg-slate-800/40 px-3 py-2 border border-slate-700/50">
                  <span class="text-slate-500 text-xs block">Session</span>
                  <span class="font-medium"><span id="session-timer">0</span> min</span>
                </div>
                <div class="rounded-lg bg-slate-800/40 px-3 py-2 border border-slate-700/50">
                  <span class="text-slate-500 text-xs block">Local time</span>
                  <span id="local-clock" class="font-medium">—</span>
                </div>
                <div class="rounded-lg bg-slate-800/40 px-3 py-2 border border-slate-700/50">
                  <span class="text-slate-500 text-xs block">Daypart</span>
                  <span id="daypart" class="font-medium text-violet-300">—</span>
                </div>
              </div>
            </div>
          </section>
        </div>
      </div>

      <!-- Bottom: alert log -->
      <section
        class="rounded-xl border border-slate-800 bg-slate-900/50 shadow-lg overflow-hidden flex flex-col max-h-48 md:max-h-56"
        aria-label="Alert history"
      >
        <div class="px-4 py-2 border-b border-slate-800 bg-slate-900/80">
          <h2 class="text-xs font-semibold uppercase tracking-wider text-slate-500">Alert log</h2>
        </div>
        <ul id="alert-history" class="alert-history overflow-y-auto flex-1 p-2 space-y-2 text-sm"></ul>
      </section>
    </div>

    <script src="/js/context.js" defer></script>
    <script src="/js/charts.js" defer></script>
    <script src="/js/websocket.js" defer></script>
    <script src="/js/alerts_ui.js" defer></script>
    <script src="/js/vision.js" defer></script>
  </body>
</html>
