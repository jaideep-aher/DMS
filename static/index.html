<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Driver Monitoring System</title>
    <link rel="stylesheet" href="/css/style.css" />
  </head>
  <body>
    <header class="header">
      <h1>Driver Monitoring System</h1>
      <p class="sub" id="status">Starting…</p>
    </header>
    <main class="main">
      <div class="video-wrap">
        <video id="video" playsinline></video>
        <canvas id="canvas"></canvas>
      </div>
      <p class="hint">
        Allow camera access. Face mesh, EAR, MAR, and head pose run in your browser; summaries are sent to the
        server over WebSocket every 200ms.
      </p>
    </main>
    <script src="/js/websocket.js" defer></script>
    <script src="/js/vision.js" defer></script>
  </body>
</html>
